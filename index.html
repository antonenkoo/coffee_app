<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Brew Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Auth Overlay -->
  <div id="auth-overlay" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <h2 id="auth-title" data-i18n="auth.title">Вход / Регистрация</h2>
      <input type="email" id="email-input" data-i18n="auth.email" placeholder="Email">
      <input type="password" id="pass-input" data-i18n="auth.password" placeholder="Пароль">
      <div style="display:flex;gap:10px;">
        <button id="login-btn" class="btn-primary" data-i18n="auth.login">Войти</button>
        <button id="signup-btn" class="btn-secondary" data-i18n="auth.signup">Регистрация</button>
      </div>
      <button id="google-btn" class="btn-secondary" data-i18n="auth.google">Войти через Google</button>
      <button id="guest-btn" class="btn-ghost" data-i18n="auth.guest">Продолжить без регистрации</button>
      <p id="auth-error" style="color:var(--warning);display:none;"></p>
    </div>
  </div>

  <!-- Sidebar Backdrop -->
  <div id="sidebar-backdrop"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">☕ Coffee Brew</div>
    <nav class="sidebar-nav">
      <a href="#calculator" class="sidebar-nav-btn active">
        <span class="sidebar-nav-icon">⚗️</span>
        <span data-i18n="nav.calc">Калькулятор</span>
      </a>
      <a href="#feed" class="sidebar-nav-btn">
        <span class="sidebar-nav-icon">🌐</span>
        <span data-i18n="nav.feed">Feed</span>
      </a>
      <a href="#recipes" class="sidebar-nav-btn">
        <span class="sidebar-nav-icon">📚</span>
        <span data-i18n="nav.mine">Мои рецепты</span>
      </a>
      <a href="#profile" class="sidebar-nav-btn">
        <span class="sidebar-nav-icon">👤</span>
        <span data-i18n="nav.profile">Профиль</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="changelog.html" id="version-link">v2.3</a>
    </div>
  </aside>

  <!-- App Shell -->
  <header>
    <button id="burger-btn" aria-label="Меню">☰</button>
    <h1 id="page-title">☕ Brew Calculator</h1>
  </header>

  <main id="view"></main>

  <script type="module" src="app.js"></script>
</body>
</html>
