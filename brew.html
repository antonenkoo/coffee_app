<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>☕ Brew</title>
  <style>
    :root {
      --bg:     #0e0e0e;
      --surface: #171717;
      --accent: #e8d5b0;
      --text:   #f5f5f5;
      --muted:  #888888;
      --dim:    #444444;
      --border: rgba(255,255,255,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    #brew-app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
      position: relative;
    }

    /* ── Stop button (top-left) ─────────── */
    #stop-btn {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: transparent;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      z-index: 10;
    }
    #stop-btn:hover { border-color: var(--text); color: var(--text); }

    /* ── Top-right method badge ─── */
    #top-right {
      position: absolute;
      top: 18px;
      right: 20px;
    }
    #brew-method-badge {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Scale connect button ────────────── */
    #scale-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 26px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    #scale-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
    #scale-btn.connecting { color: var(--muted); animation: scale-pulse 1s ease-in-out infinite; }
    #scale-btn.connected  { border-color: rgba(232,213,176,0.5); color: var(--accent); background: rgba(232,213,176,0.06); }
    #scale-btn.unsupported { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    #scale-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      display: none;
      flex-shrink: 0;
    }
    #scale-btn.connected #scale-dot { display: block; }

    /* ── Tare button (visible only when scale connected) ── */
    #tare-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: transparent;
      border: 1px solid rgba(232,213,176,0.3);
      border-radius: 20px;
      color: var(--accent);
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    #tare-btn:hover { background: rgba(232,213,176,0.08); border-color: rgba(232,213,176,0.6); }
    #tare-btn.visible { display: inline-flex; }

    /* ── Scale widget picker (shown after connect) ── */
    #scale-widgets {
      display: none;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 0.82rem;
    }
    #scale-widgets.visible { display: flex; }
    .widget-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted, var(--muted));
      cursor: pointer;
      user-select: none;
    }
    .widget-row input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .widget-row span { flex: 1; }

    @keyframes scale-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Live weight + flow in brew phase ── */
    #scale-live {
      display: flex;
      gap: 36px;
      justify-content: center;
      padding: 0 0 12px;
    }
    .scale-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .scale-stat-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .scale-stat-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .scale-stat-val {
      font-size: 3.4rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .scale-stat-unit {
      font-size: 1.1rem;
      color: var(--muted);
    }

    /* ── Recipe profile chart (always visible in brew phase) ── */
    #recipe-chart-wrap {
      width: 100%;
      position: relative;
    }
    #recipe-chart {
      width: 100%;
      height: 72px;
      border-radius: 10px;
      display: block;
      opacity: 0.9;
    }

    /* ── Pour speed hint ── */
    #current-speed {
      font-size: 0.75rem;
      color: var(--accent);
      opacity: 0.75;
      margin-top: 4px;
      letter-spacing: 0.03em;
      min-height: 1.1em;
    }

    /* ── Weight graph (brew + done phases) ── */
    .brew-graph {
      width: 100%;
      max-width: 320px;
      height: 90px;
      opacity: 0.85;
      border-radius: 8px;
    }

    /* ── Brew grid ─────────────────────────── */
    #brew-grid { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    /* Mobile: only timer + fact shown; scale blocks appear when connected */
    .brew-block          { display: none; }
    #block-timer         { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    /* Scale blocks become visible on mobile when .active (scale connected + widget on) */
    .brew-block.active   { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 0; }
    .brew-block-label    { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }

    .brew-block-val { display: flex; align-items: baseline; gap: 4px; }
    .brew-block-val > span:first-child {
      font-size: 3.2rem; font-weight: 700; color: var(--accent);
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .brew-block-unit { font-size: 1rem; color: var(--muted); }

    /* Finish brew button */
    #finish-btn {
      margin-top: 12px;
      padding: 12px 36px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      color: var(--muted);
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #finish-btn:hover { border-color: rgba(255,255,255,0.35); color: var(--text); }

    /* ── Desktop brew layout (≥900px) ──────────────────── */
    @media (min-width: 900px) {
      #brew-app { padding: 40px 48px; }
      #phase-brew { max-width: 900px; width: 100%; gap: 14px; }

      /* 3-row grid: [timer weight] [graph] [flow fact] */
      #brew-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "timer  weight"
          "graph  graph"
          "flow   fact";
        gap: 14px;
      }

      #block-timer  { grid-area: timer;  display: flex; }
      #block-weight { grid-area: weight; display: flex; }
      #block-graph  { grid-area: graph;  display: flex; }
      #block-flow   { grid-area: flow;   display: flex; }
      #block-fact   { grid-area: fact;   display: flex; }

      /* All blocks visible as cards on desktop */
      .brew-block {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 28px 20px;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border);
        border-radius: 16px;
        text-align: center;
      }

      /* Scale blocks dim until connected */
      .brew-block--scale { opacity: 0.3; transition: opacity 0.3s; }
      .brew-block--scale.active { opacity: 1; }

      /* Graph full row */
      .brew-block--wide .brew-graph { width: 100%; max-width: 100%; height: 110px; }

      /* Large values */
      #block-timer #brew-timer   { font-size: 5rem; padding: 0; }
      .brew-block-val > span:first-child { font-size: 4rem; }
      .brew-block-unit { font-size: 1.2rem; }

      /* Fact text */
      #brew-fact-text { font-size: 0.82rem; color: var(--muted); line-height: 1.6; max-width: 220px; }

      #scale-live { display: none !important; }
    }

    /* ── Done scale summary ── */
    #done-scale-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      padding: 8px 0 4px;
    }
    .done-scale-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .done-scale-stat-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .done-scale-stat-val {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .done-scale-stat-unit {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Voice settings row ─────────────── */
    #voice-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      font-size: 0.8rem;
      color: var(--muted);
    }
    #voice-row select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 4px 8px;
      cursor: pointer;
    }
    #voice-row select:focus { outline: none; border-color: var(--accent); }

    /* ── Phase containers ───────────────── */
    .phase {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .hidden { display: none !important; }

    /* ══════════════ START PHASE ═══════════════ */
    #phase-start { text-align: center; }

    .brew-params-box {
      width: 100%;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brew-param {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
    }
    .brew-param-label { color: var(--muted); }
    .brew-param-value { color: var(--accent); font-weight: 500; font-variant-numeric: tabular-nums; }

    /* Prep steps (AeroPress) */
    #prep-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }
    .prep-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .prep-step {
      display: flex;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      font-size: 0.875rem;
      align-items: flex-start;
    }
    .prep-step-num { color: var(--accent); font-weight: 600; flex-shrink: 0; width: 18px; }

    /* Start button */
    #start-btn {
      padding: 15px 52px;
      background: var(--accent);
      border: none;
      border-radius: 32px;
      color: var(--bg);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #start-btn:hover { background: #f0e0c0; }
    #start-btn:active { transform: scale(0.96); }

    /* ══════════════ COUNTDOWN PHASE ═══════════════ */
    #phase-countdown { justify-content: center; }

    #countdown-num {
      font-size: 9rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: opacity 0.12s;
      text-align: center;
      user-select: none;
    }

    /* ══════════════ BREW PHASE ═════════════════════ */
    #phase-brew {
      align-items: stretch;
      gap: 0;
    }

    /* Progress bar (top of screen) */
    #progress-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.07);
      z-index: 5;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 1s linear;
      width: 0%;
    }

    /* Large timer */
    #brew-timer {
      font-size: 7rem;
      font-weight: 800;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      text-align: center;
      line-height: 1;
      letter-spacing: -0.02em;
      padding: 20px 0 28px;
    }

    /* Current step */
    #current-step-wrap {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 8px 28px;
      min-height: 130px;
    }
    #current-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
    }
    #current-action {
      font-size: 1.45rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.35;
    }
    #current-action b { color: var(--text); }
    #current-note {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Next step */
    #next-step-wrap {
      text-align: center;
      padding: 16px 12px 0;
      border-top: 1px solid var(--border);
    }
    #next-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
      margin-bottom: 5px;
    }
    #next-action {
      font-size: 0.95rem;
      color: var(--dim);
      line-height: 1.4;
    }
    #next-action b { color: #555; }
    #next-in {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 5px;
      font-variant-numeric: tabular-nums;
    }

    /* ══════════════ DONE PHASE ═════════════════════ */
    #phase-done { text-align: center; gap: 14px; }
    #done-emoji { font-size: 4rem; }
    #done-title { font-size: 2.2rem; font-weight: 700; color: var(--text); }
    #done-time  { font-size: 1rem; color: var(--muted); font-variant-numeric: tabular-nums; }

    .done-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 280px;
      margin-top: 8px;
    }

    #save-btn {
      padding: 14px 36px;
      background: var(--accent);
      border: none;
      border-radius: 28px;
      color: #0e0e0e;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    #save-btn:hover { background: #f0e0c0; }

    #back-btn {
      padding: 12px 36px;
      background: transparent;
      border: 1px solid rgba(232,213,176,0.3);
      border-radius: 28px;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    #back-btn:hover { color: var(--accent); border-color: rgba(232,213,176,0.6); }

    @media (max-width: 380px) {
      #brew-timer { font-size: 5.5rem; }
      #current-action { font-size: 1.2rem; }
      #countdown-num { font-size: 7rem; }
    }
  </style>
</head>
<body>
<div id="brew-app">
  <button id="stop-btn" title="Остановить">✕</button>
  <div id="top-right">
    <div id="brew-method-badge"></div>
  </div>

  <!-- ── START PHASE ─────────────────────────── -->
  <div id="phase-start" class="phase">
    <div class="brew-params-box" id="brew-params-info"></div>
    <div id="prep-wrap" class="hidden">
      <div class="prep-title" data-i18n="brew.prep.title">Подготовка перед таймером:</div>
      <div id="prep-list"></div>
    </div>
    <div id="voice-row">
      <span>🔔</span>
      <select id="alert-mode">
        <option value="beep" selected>Бип</option>
        <option value="bell">Колокольчик</option>
        <option value="gong">Гонг</option>
        <option value="chime">Чайм</option>
        <option value="off">Без звука</option>
      </select>
      <button id="voice-test-btn" title="Проверить звук" style="flex-shrink:0;padding:4px 8px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:0.8rem;cursor:pointer;">▶</button>
    </div>
    <button id="start-btn" data-i18n="brew.start.btn">▶&nbsp;&nbsp;Начать заваривание</button>
    <div style="display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;">
      <button id="scale-btn" title="Подключить весы">
        <span id="scale-dot"></span>
        <span id="scale-btn-text">⚖&nbsp;&nbsp;Подключить весы</span>
      </button>
      <button id="tare-btn" title="Тарировать весы">↺&nbsp;&nbsp;Tare</button>
    </div>
    <div id="scale-widgets">
      <label class="widget-row">
        <input type="checkbox" id="w-weight" checked>
        <span>⚖ Вес (г)</span>
      </label>
      <label class="widget-row">
        <input type="checkbox" id="w-flow" checked>
        <span>💧 Скорость потока (г/с)</span>
      </label>
      <label class="widget-row">
        <input type="checkbox" id="w-graph">
        <span>📈 График веса</span>
      </label>
    </div>
  </div>

  <!-- ── COUNTDOWN PHASE ─────────────────────── -->
  <div id="phase-countdown" class="phase hidden">
    <div id="countdown-num">5</div>
  </div>

  <!-- ── BREW PHASE ──────────────────────────── -->
  <div id="phase-brew" class="phase hidden">
    <div id="progress-wrap"><div id="progress-fill"></div></div>

    <!-- Recipe profile chart (always visible) -->
    <div id="recipe-chart-wrap">
      <canvas id="recipe-chart" width="640" height="144"></canvas>
    </div>

    <!-- 4-block grid: Timer+Weight / Graph / Flow+Fact -->
    <div id="brew-grid">
      <div class="brew-block" id="block-timer">
        <div class="brew-block-label">Время</div>
        <div id="brew-timer">00:00</div>
      </div>
      <div class="brew-block brew-block--scale" id="block-weight">
        <div class="brew-block-label">Вес</div>
        <div class="brew-block-val"><span id="scale-live-g">—</span><span class="brew-block-unit">г</span></div>
      </div>
      <div class="brew-block brew-block--wide" id="block-graph">
        <div class="brew-block-label">График веса</div>
        <canvas id="weight-graph" class="brew-graph" width="640" height="100"></canvas>
      </div>
      <div class="brew-block brew-block--scale" id="block-flow">
        <div class="brew-block-label">Поток</div>
        <div class="brew-block-val"><span id="scale-live-flow">—</span><span class="brew-block-unit">г/с</span></div>
      </div>
      <div class="brew-block" id="block-fact">
        <div class="brew-block-label">Знаете ли вы</div>
        <div id="brew-fact-text"></div>
      </div>
    </div>
    <div id="current-step-wrap">
      <div id="current-label" data-i18n="brew.current.label">Текущий шаг</div>
      <div id="current-action"></div>
      <div id="current-note"></div>
      <div id="current-speed"></div>
    </div>
    <div id="next-step-wrap">
      <div id="next-label" data-i18n="brew.next.label">Следующий</div>
      <div id="next-action"></div>
      <div id="next-in"></div>
    </div>
    <button id="finish-btn">■&nbsp;&nbsp;Завершить</button>
  </div>

  <!-- ── DONE PHASE ──────────────────────────── -->
  <div id="phase-done" class="phase hidden">
    <div id="done-emoji">☕</div>
    <div id="done-title" data-i18n="brew.done.title">Готово!</div>
    <div id="done-time"></div>
    <canvas id="done-graph" class="brew-graph" width="320" height="90" style="display:none;"></canvas>
    <div id="done-scale-stats" style="display:none;">
      <div class="done-scale-stat">
        <span class="done-scale-stat-label">Итог вес</span>
        <div style="display:flex;align-items:baseline;gap:3px;">
          <span class="done-scale-stat-val" id="done-final-weight">—</span>
          <span class="done-scale-stat-unit">г</span>
        </div>
      </div>
      <div class="done-scale-stat">
        <span class="done-scale-stat-label">Средний поток</span>
        <div style="display:flex;align-items:baseline;gap:3px;">
          <span class="done-scale-stat-val" id="done-avg-flow">—</span>
          <span class="done-scale-stat-unit">г/с</span>
        </div>
      </div>
    </div>
    <div class="done-actions">
      <button id="save-btn" data-i18n="brew.save.btn">Записать рецепт</button>
      <button id="back-btn" data-i18n="brew.back.btn">Завершить без записи</button>
    </div>
  </div>
</div>

<script type="module">
import { t, applyI18n } from './js/i18n.js'
import { BLEScale }     from './js/scale.js'
applyI18n()

// ── Read brew data from sessionStorage ───────────────────────────────────────
const brewData = JSON.parse(sessionStorage.getItem('brewState') || 'null')
if (!brewData) { window.location.href = 'index.html' }

const { method, coffee_g, water_g, temp_c, ratio, brew_time_sec, brewSteps } = brewData
const isSimpleMode = brewData.mode === 'simple'

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmt(totalSec) {
  const m = Math.floor(Math.abs(totalSec) / 60)
  const s = Math.abs(totalSec) % 60
  return `${m}:${String(s).padStart(2, '0')}`
}

// ── Audio + Vibration ────────────────────────────────────────────────────────
let _audioCtx = null

function playBeep(freq = 880, dur = 0.25) {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    const osc  = _audioCtx.createOscillator()
    const gain = _audioCtx.createGain()
    osc.connect(gain)
    gain.connect(_audioCtx.destination)
    osc.frequency.value = freq
    osc.type = 'sine'
    gain.gain.setValueAtTime(0.25, _audioCtx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + dur)
    osc.start(_audioCtx.currentTime)
    osc.stop(_audioCtx.currentTime + dur)
  } catch (_) { /* no audio */ }
}

function vibrate(pattern = [200, 100, 200]) {
  try { navigator.vibrate?.(pattern) } catch (_) {}
}

// ── Method badge ─────────────────────────────────────────────────────────────
document.getElementById('brew-method-badge').textContent =
  isSimpleMode ? 'Простой режим' : method === 'aeropress' ? 'AeroPress' : 'V60'

// ── Params info box ──────────────────────────────────────────────────────────
if (isSimpleMode) {
  document.getElementById('brew-params-info').style.display = 'none'
} else {
  document.getElementById('brew-params-info').innerHTML = [
    [t('save.label.coffee'), `${coffee_g}г`],
    [t('save.label.water'),  `${water_g}г`],
    [t('save.label.temp'),   `${temp_c}°C`],
    ['Ratio',                `1:${(+ratio).toFixed(1)}`],
    [t('save.label.time'),   fmt(brew_time_sec)],
  ].map(([l, v]) =>
    `<div class="brew-param"><span class="brew-param-label">${l}</span><span class="brew-param-value">${v}</span></div>`
  ).join('')
}

// ── Separate prep (null) vs timer steps ──────────────────────────────────────
const prepSteps   = isSimpleMode ? [] : brewSteps.filter(s => s.start_sec === null)
const timerSteps  = isSimpleMode ? [] : brewSteps.filter(s => s.start_sec !== null)

if (prepSteps.length > 0) {
  document.getElementById('prep-wrap').classList.remove('hidden')
  document.getElementById('prep-list').innerHTML = prepSteps.map((s, i) => `
    <div class="prep-step">
      <span class="prep-step-num">${i + 1}.</span>
      <span>${s.action}</span>
    </div>`).join('')
}

// ── Phase switching ──────────────────────────────────────────────────────────
function showPhase(id) {
  ['phase-start','phase-countdown','phase-brew','phase-done'].forEach(p =>
    document.getElementById(p).classList.toggle('hidden', p !== id)
  )
}

// ── Countdown ────────────────────────────────────────────────────────────────
function startCountdown() {
  showPhase('phase-countdown')
  const numEl = document.getElementById('countdown-num')
  let count = 3

  const tick = () => {
    numEl.textContent = count
    numEl.style.opacity = '1'
    if (count === 0) {
      numEl.textContent = 'GO!'
      numEl.style.fontSize = '5rem'
      numEl.style.letterSpacing = '0.08em'
      playBeep(660, 0.5)
      vibrate([300])
      setTimeout(startBrew, 800)
      return
    }
    count--
    setTimeout(() => {
      numEl.style.opacity = '0'
      setTimeout(tick, 150)
    }, 850)
  }
  tick()
}

// ── Brew timer ───────────────────────────────────────────────────────────────
let brewInterval  = null
let elapsed       = 0
let currentIdx    = -1

function getCurrentIdx(sec) {
  let idx = 0
  for (let i = 0; i < timerSteps.length; i++) {
    if (timerSteps[i].start_sec <= sec) idx = i
    else break
  }
  return idx
}

function updateStepUI(idx) {
  const step = timerSteps[idx]
  const next = timerSteps[idx + 1]

  document.getElementById('current-action').innerHTML = step.action

  const noteEl = document.getElementById('current-note')
  noteEl.textContent = step.note ?? ''
  noteEl.style.display = step.note ? '' : 'none'

  const speedEl = document.getElementById('current-speed')
  if (step.speed_gs) {
    const dur = next ? next.start_sec - step.start_sec : null
    const durTxt = dur ? ` (~${dur}с)` : ''
    speedEl.textContent = `⚡ ${step.speed_gs} г/с${durTxt}`
  } else {
    speedEl.textContent = ''
  }

  const nextWrap = document.getElementById('next-step-wrap')
  if (next) {
    document.getElementById('next-action').innerHTML = next.action
    nextWrap.style.display = ''
  } else {
    nextWrap.style.display = 'none'
  }
}

function startBrew() {
  showPhase('phase-brew')
  elapsed    = 0
  currentIdx = 0

  _graphPts.length = 0
  document.getElementById('brew-fact-text').textContent =
    _FACTS[Math.floor(Math.random() * _FACTS.length)]

  // Draw initial recipe profile chart
  _drawRecipeChart()

  if (isSimpleMode) {
    document.getElementById('current-step-wrap').style.display = 'none'
    document.getElementById('next-step-wrap').style.display    = 'none'
    document.getElementById('progress-wrap').style.display     = 'none'
    brewInterval = setInterval(() => {
      elapsed++
      document.getElementById('brew-timer').textContent = fmt(elapsed)
    }, 1000)
    return
  }

  updateStepUI(0)

  brewInterval = setInterval(() => {
    elapsed++

    // Timer + progress + recipe chart
    document.getElementById('brew-timer').textContent = fmt(elapsed)
    document.getElementById('progress-fill').style.width =
      `${Math.min(100, (elapsed / brew_time_sec) * 100)}%`
    _drawRecipeChart()

    // Step advance
    const newIdx = getCurrentIdx(elapsed)
    if (newIdx !== currentIdx) {
      currentIdx = newIdx
      updateStepUI(newIdx)
      playBeep()
      vibrate()

      // Last step reached → finish after a brief pause
      if (newIdx === timerSteps.length - 1) {
        clearInterval(brewInterval)
        setTimeout(() => showDone(elapsed), 3000)
        return
      }
    }

    // Update "next in" countdown + voice alert at 5 sec
    const next = timerSteps[currentIdx + 1]
    if (next) {
      const rem = next.start_sec - elapsed
      document.getElementById('next-in').textContent =
        rem > 0 ? `через ${fmt(rem)}` : 'сейчас!'
      if (rem === 5 && voiceAlertSentForStep !== currentIdx + 1) {
        voiceAlertSentForStep = currentIdx + 1
        playAlert()
      }
    }
  }, 1000)
}

function showDone(totalSec) {
  clearInterval(brewInterval)
  showPhase('phase-done')
  document.getElementById('done-time').textContent =
    t('brew.time.label') + fmt(totalSec)

  // Scale summary on done screen
  if (_graphPts.length >= 2) {
    const doneGraph = document.getElementById('done-graph')
    doneGraph.style.display = 'block'
    _drawGraphOn(doneGraph)

    const statsEl = document.getElementById('done-scale-stats')
    statsEl.style.display = 'flex'
    const firstW = _graphPts[0].w
    const lastW  = _graphPts[_graphPts.length - 1].w
    document.getElementById('done-final-weight').textContent = lastW.toFixed(1)
    const avgFlow = totalSec > 0 ? Math.max(0, (lastW - firstW) / totalSec) : 0
    document.getElementById('done-avg-flow').textContent = avgFlow.toFixed(2)
  }

  // Always save stats to sessionStorage for save-recipe page
  try {
    const stored = JSON.parse(sessionStorage.getItem('brewState') || '{}')
    stored.actual_brew_time_sec = totalSec
    if (_graphPts.length >= 2) {
      stored.scale_final_weight = +_graphPts[_graphPts.length - 1].w.toFixed(1)
      const firstW = _graphPts[0].w
      stored.scale_avg_flow = totalSec > 0
        ? +Math.max(0, (stored.scale_final_weight - firstW) / totalSec).toFixed(3)
        : 0
    }
    sessionStorage.setItem('brewState', JSON.stringify(stored))
  } catch(_) {}
  document.getElementById('save-btn').textContent =
    isSimpleMode ? 'Записать сессию' : 'Записать рецепт'
  // Victory beeps
  playBeep(523, 0.18)
  setTimeout(() => playBeep(659, 0.18), 220)
  setTimeout(() => playBeep(784, 0.35), 440)
  vibrate([100, 50, 100, 50, 300])
}

// ── Button handlers ──────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  _audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  startCountdown()
})

document.getElementById('stop-btn').addEventListener('click', () => {
  // Don't stop the timer before confirming — interval keeps running during dialog
  const ok = confirm(t('brew.stop.confirm'))
  if (ok) {
    clearInterval(brewInterval)
    window.location.href = 'index.html'
  }
})

document.getElementById('finish-btn').addEventListener('click', () => {
  showDone(elapsed)
})

document.getElementById('save-btn').addEventListener('click', () => {
  window.location.href = 'save-recipe.html'
})

document.getElementById('back-btn').addEventListener('click', () => {
  const ok = confirm(t('brew.exit.confirm'))
  if (ok) window.location.href = 'index.html'
})

// ── Voice alerts ─────────────────────────────────────────────────────────────
let voiceAlertSentForStep = -1

function _brewTone(freq, dur, delayStart = 0) {
  try {
    const osc  = _audioCtx.createOscillator()
    const gain = _audioCtx.createGain()
    osc.connect(gain); gain.connect(_audioCtx.destination)
    osc.type = 'sine'; osc.frequency.value = freq
    const t = _audioCtx.currentTime + delayStart
    gain.gain.setValueAtTime(0.22, t)
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur)
    osc.start(t); osc.stop(t + dur)
  } catch (_) {}
}

function playAlert() {
  const mode = document.getElementById('alert-mode').value
  if (mode === 'off') return
  if (mode === 'beep')       { _brewTone(660, 0.12); _brewTone(880, 0.20, 0.18) }
  else if (mode === 'bell')  { _brewTone(1047, 0.6); _brewTone(1319, 0.3, 0.02) }
  else if (mode === 'gong')  { _brewTone(220, 1.4);  _brewTone(110, 0.8, 0.05)  }
  else if (mode === 'chime') { _brewTone(1568, 0.5); _brewTone(1976, 0.4, 0.12); _brewTone(2093, 0.3, 0.25) }
}

// ── BLE Scale ────────────────────────────────────────────────────────────────
const scaleLiveG    = document.getElementById('scale-live-g')
const scaleLiveFlow = document.getElementById('scale-live-flow')
const scaleBtn      = document.getElementById('scale-btn')
const scaleBtnTx    = document.getElementById('scale-btn-text')
const scaleWidgets  = document.getElementById('scale-widgets')
const tareBtn       = document.getElementById('tare-btn')
const weightCanvas  = document.getElementById('weight-graph')

// Widget preference helpers
function _wPref(id)    { return localStorage.getItem('scale_w_' + id) !== '0' }
function _wSave(id, v) { localStorage.setItem('scale_w_' + id, v ? '1' : '0') }

// Restore widget checkboxes from prefs
;['weight','flow','graph'].forEach(id => {
  const el = document.getElementById('w-' + id)
  if (el) el.checked = _wPref(id)
  el?.addEventListener('change', () => _wSave(id, el.checked))
})

// Apply widget visibility to brew phase elements
// ── Fun facts ─────────────────────────────────────────────────────────────────
const _FACTS = [
  'Кофе открыли в Эфиопии: коза по имени Калди не спала после ягод — её пастух решил попробовать.',
  'Осьминоги имеют три сердца, голубую кровь и девять мозгов.',
  'Финляндия пьёт больше кофе на душу населения, чем любая другая страна — около 12 кг в год.',
  'Слово «espresso» означает «выдавленный» по-итальянски — не «быстрый».',
  'Мёд никогда не портится: в египетских гробницах нашли 3000-летний мёд, который всё ещё можно есть.',
  'Кошки не чувствуют сладкий вкус — у них нет соответствующих рецепторов.',
  'Первые кофейни открылись в Константинополе в 1554 году и стали центрами интеллектуальных дискуссий.',
  'Морские выдры держатся за лапы во сне, чтобы не унесло течением.',
  'Зёрна кофе — это косточки плода, похожего на вишню, который называют «кофейной ягодой».',
  'Воробьи узнают лица людей и запоминают тех, кто их обидел.',
  'Первый коммерческий рейс произошёл в 1914 году — расстояние 34 км, время в пути 23 минуты.',
  'Кофе помогает пчёлам: нектар с кофеином улучшает память пчёл о местах хорошего опыления.',

]

function _applyWidgets() {
  const showWeight = document.getElementById('w-weight').checked
  const showFlow   = document.getElementById('w-flow').checked
  const showGraph  = document.getElementById('w-graph').checked
  const connected  = scale.state === 'connected'

  // .active class: on desktop = full opacity; on mobile = display: flex (via CSS)
  document.getElementById('block-weight').classList.toggle('active', connected && showWeight)
  document.getElementById('block-flow').classList.toggle('active',   connected && showFlow)
  document.getElementById('block-graph').classList.toggle('active',  connected && showGraph)
  weightCanvas.style.display = (connected && showGraph) ? 'block' : 'none'
}

// Cumulative weight graph (all points from brew start, never shifted)
const _graphPts = []  // { w, t } — weight + elapsed seconds

// Shared coord helpers for all charts
function _chartCoords(canvas, maxT, maxW) {
  const W = canvas.width, H = canvas.height
  const pad = { t: H * 0.08, b: H * 0.08 }
  const innerH = H - pad.t - pad.b
  return {
    W, H,
    px: (t, w) => ({
      x: (t / maxT) * W,
      y: pad.t + innerH - (Math.min(w, maxW * 1.05) / (maxW * 1.1)) * innerH
    })
  }
}

// Always-visible recipe profile chart (+ BLE overlay when connected)
function _drawRecipeChart() {
  const canvas = document.getElementById('recipe-chart')
  if (!canvas) return
  const ctx = canvas.getContext('2d')
  const maxT = brew_time_sec || 1
  const maxW = (water_g || 1) * 1.05
  const { W, H, px } = _chartCoords(canvas, maxT, maxW)

  ctx.clearRect(0, 0, W, H)

  // Profile points from timer steps
  const profile = timerSteps.filter(s => s.target_g != null)

  // 1. Dashed profile line
  if (profile.length >= 2) {
    ctx.beginPath()
    ctx.setLineDash([4, 5])
    profile.forEach((s, i) => {
      const {x, y} = px(s.start_sec, s.target_g)
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
    })
    ctx.strokeStyle = 'rgba(232,213,176,0.28)'
    ctx.lineWidth = 1.5
    ctx.stroke()
    ctx.setLineDash([])

    // Profile dots
    profile.forEach(s => {
      const {x, y} = px(s.start_sec, s.target_g)
      ctx.beginPath()
      ctx.arc(x, y, 3.5, 0, Math.PI * 2)
      ctx.fillStyle = 'rgba(232,213,176,0.55)'
      ctx.fill()
    })
  }

  // 2. BLE live data (fill + line)
  if (_graphPts.length >= 2) {
    ctx.beginPath()
    _graphPts.forEach((p, i) => {
      const {x, y} = px(p.t, p.w)
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
    })
    const {x: lx} = px(_graphPts[_graphPts.length - 1].t, 0)
    ctx.lineTo(lx, H); ctx.lineTo(0, H); ctx.closePath()
    ctx.fillStyle = 'rgba(232,213,176,0.07)'
    ctx.fill()

    ctx.beginPath()
    _graphPts.forEach((p, i) => {
      const {x, y} = px(p.t, p.w)
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
    })
    ctx.strokeStyle = 'rgba(232,213,176,0.85)'
    ctx.lineWidth = 2; ctx.lineJoin = 'round'
    ctx.stroke()
  }

  // 3. Current time marker
  if (elapsed > 0) {
    const {x} = px(elapsed, 0)
    ctx.beginPath()
    ctx.moveTo(x, 0); ctx.lineTo(x, H)
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'
    ctx.lineWidth = 1; ctx.setLineDash([])
    ctx.stroke()
  }
}

// BLE-only weight graph (widget in block-graph)
function _drawGraphOn(canvas) {
  if (_graphPts.length < 2) return
  const c = canvas, ctx = c.getContext('2d')
  const W = c.width, H = c.height
  ctx.clearRect(0, 0, W, H)
  const maxW = Math.max(..._graphPts.map(p => p.w), 1)
  const maxT = _graphPts[_graphPts.length - 1].t || 1
  ctx.beginPath()
  _graphPts.forEach((p, i) => {
    const x = (p.t / maxT) * W
    const y = H - (p.w / maxW) * H * 0.85 - H * 0.05
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
  })
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath()
  ctx.fillStyle = 'rgba(232,213,176,0.08)'; ctx.fill()
  ctx.beginPath()
  _graphPts.forEach((p, i) => {
    const x = (p.t / maxT) * W
    const y = H - (p.w / maxW) * H * 0.85 - H * 0.05
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
  })
  ctx.strokeStyle = 'rgba(232,213,176,0.8)'; ctx.lineWidth = 2; ctx.lineJoin = 'round'
  ctx.stroke()
}

let flowPrevW = null, flowPrevT = null

const scale = new BLEScale({
  onWeight(g) {
    // Update weight display (both mobile stat and desktop block)
    if (document.getElementById('w-weight').checked) {
      scaleLiveG.textContent = g.toFixed(1)
      document.getElementById('scale-live-g') // same element, already updated above
    }
    // flow rate
    const now = Date.now()
    if (flowPrevW !== null) {
      const dt = (now - flowPrevT) / 1000
      if (dt >= 0.8) {
        const flow = (g - flowPrevW) / dt
        const flowStr = flow > 0.05 ? flow.toFixed(1) : '0.0'
        if (document.getElementById('w-flow').checked) scaleLiveFlow.textContent = flowStr
        flowPrevW = g; flowPrevT = now
      }
    } else {
      flowPrevW = g; flowPrevT = now
    }
    // cumulative graph
    _graphPts.push({ w: Math.max(0, g), t: elapsed })
    if (document.getElementById('w-graph').checked) _drawGraphOn(weightCanvas)
  },
  onState(state, name) {
    scaleBtn.className = state
    if (state === 'connecting') {
      scaleBtnTx.innerHTML = '⚖&nbsp;&nbsp;Подключение…'
      scaleWidgets.classList.remove('visible')
    } else if (state === 'connected') {
      scaleBtnTx.innerHTML = name ? `⚖&nbsp;&nbsp;${name}` : '⚖&nbsp;&nbsp;Весы подключены'
      scaleWidgets.classList.add('visible')
      tareBtn.classList.add('visible')
      _applyWidgets()
    } else {
      scaleBtnTx.innerHTML = '⚖&nbsp;&nbsp;Подключить весы'
      scaleWidgets.classList.remove('visible')
      tareBtn.classList.remove('visible')
      scaleLiveG.textContent = '—'
      scaleLiveFlow.textContent = '—'
      weightCanvas.style.display = 'none'
      document.getElementById('block-weight').classList.remove('active')
      document.getElementById('block-flow').classList.remove('active')
      document.getElementById('block-graph').classList.remove('active')
      flowPrevW = null; flowPrevT = null
    }
  }
})

if (!scale.supported) {
  scaleBtn.classList.add('unsupported')
  scaleBtn.title = 'Web Bluetooth не поддерживается в этом браузере'
}

scaleBtn.addEventListener('click', () => {
  if (scale.state === 'connected') scale.disconnect()
  else if (scale.state === 'disconnected') scale.connect()
})

tareBtn.addEventListener('click', () => scale.tare())

// ── Voice test button ────────────────────────────────────────────────────────
document.getElementById('voice-test-btn').addEventListener('click', async () => {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  if (_audioCtx.state === 'suspended') await _audioCtx.resume()
  const btn = document.getElementById('voice-test-btn')
  btn.textContent = '♪'
  playAlert()
  setTimeout(() => { btn.textContent = '▶' }, 1000)
})

// ── Restore alert mode from localStorage ────────────────────────────────────
;(function() {
  const saved = localStorage.getItem('coffee_alert_mode')
  if (saved) {
    const sel = document.getElementById('alert-mode')
    // migrate any old ja-* values to beep
    const migrated = saved.startsWith('ja-') ? 'beep' : saved
    sel.value = migrated
    if (migrated !== saved) localStorage.setItem('coffee_alert_mode', migrated)
  }
  if (isSimpleMode) {
    document.getElementById('voice-row').style.display = 'none'
  }
})()
